name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            platform: macos-latest
            rustTarget: x86_64-apple-darwin
            tauriArgs: --target x86_64-apple-darwin
          - name: macOS Apple Silicon
            platform: macos-latest
            rustTarget: aarch64-apple-darwin
            tauriArgs: --target aarch64-apple-darwin
          - name: Linux
            platform: ubuntu-22.04
            rustTarget: ""
            tauriArgs: ""
          - name: Windows
            platform: windows-latest
            rustTarget: ""
            tauriArgs: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rustTarget != ''
        run: rustup target add ${{ matrix.rustTarget }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "CodeSail ${{ inputs.tag || github.ref_name }}"
          releaseBody: |
            ## 下载说明

            请根据你的系统下载对应安装包：

            | 系统 | 下载文件 |
            | --- | --- |
            | macOS Apple Silicon（M1/M2/M3/M4） | `CodeSail_*_aarch64.dmg` |
            | macOS Intel 芯片 | `CodeSail_*_x64.dmg` |
            | Windows 64 位 | `CodeSail_*_x64-setup.exe` |
            | Ubuntu / Debian Linux | `CodeSail_*_amd64.deb` |
            | Fedora / RHEL / openSUSE Linux | `CodeSail-*-1.x86_64.rpm` |
            | 其他 Linux 桌面发行版 | `CodeSail_*_amd64.AppImage` |

            普通用户通常不需要下载 `*.app.tar.gz` 或 `Source code`。`*.app.tar.gz` 是 Tauri 生成的应用归档文件，`Source code` 只适合需要自己编译 CodeSail 的开发者。

            ## macOS 安全提示

            当前 macOS 安装包还没有接入 Apple Developer 签名和公证。如果系统提示“CodeSail 已损坏，无法打开”，通常是 macOS Gatekeeper 拦截了未签名应用，不代表安装包真的损坏。

            把 CodeSail 拖到“应用程序”后，可以在终端执行：

            ```bash
            xattr -cr /Applications/CodeSail.app
            ```

            然后重新打开 CodeSail。后续接入 Apple Developer 证书、签名和 notarization 后，就不需要这一步。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauriArgs }}
